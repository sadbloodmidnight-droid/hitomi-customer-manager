<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitomi Customer Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<style>
body{
font-family:sans-serif;
max-width:900px;
margin:auto;
padding:16px;
background:#f5f5f5;
}

h1{
text-align:center;
font-size:26px;
}

.card,.customer{
background:white;
padding:15px;
margin-bottom:14px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,textarea,select{
width:100%;
padding:11px;
margin-top:5px;
margin-bottom:10px;
box-sizing:border-box;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

label{
display:block;
font-weight:bold;
margin-top:10px;
margin-bottom:4px;
}

button{
padding:10px 14px;
margin:4px;
cursor:pointer;
border:none;
border-radius:8px;
background:#333;
color:white;
font-size:15px;
}

button.sub{
background:#777;
}

button.danger{
background:#b00020;
}

button.ngbtn{
background:#d35400;
}

.customer.ng{
border:2px solid #b00020;
background:#fff0f0;
}

.ng-label{
display:inline-block;
padding:4px 8px;
margin:3px 3px 3px 0;
background:#b00020;
color:white;
border-radius:999px;
font-size:13px;
font-weight:bold;
}

.checkbox-row{
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
margin-bottom:10px;
font-weight:bold;
}

.checkbox-row input{
width:auto;
margin:0;
}

.customer b{
font-size:20px;
}

.actions{
margin-top:10px;
}

.search-box{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.small{
color:#666;
font-size:14px;
}

.badge{
display:inline-block;
padding:4px 8px;
margin:3px 3px 3px 0;
background:#eee;
border-radius:999px;
font-size:13px;
}

.memo{
margin-top:8px;
line-height:1.5;
}

@media(max-width:600px){
.search-box{
grid-template-columns:1fr;
}
body{
padding:10px;
}
}
</style>
</head>

<body>

<h1>👥 Customer Manager</h1>

<div class="card">
<h3>顧客登録</h3>

<label>名前・呼び名</label>
<input id="name" placeholder="名前・呼び名">

<label>電話番号</label>
<input id="phone" placeholder="電話番号">

<label>初回来店日</label>
<input id="firstVisit" type="date">

<label>最終来店日</label>
<input id="lastVisit" type="date">

<label>次回予約日</label>
<input id="nextVisit" type="date">

<label>来店回数</label>
<input id="visitCount" type="number" min="0" placeholder="来店回数">

<label>メモ</label>
<textarea id="memo" rows="4" placeholder="特徴・好み・会話内容・注意点など"></textarea>

<label class="checkbox-row">
<input id="isNg" type="checkbox">
NG顧客にする
</label>

<label>NG理由</label>
<textarea id="ngReason" rows="3" placeholder="NG理由・注意内容"></textarea>

<button onclick="saveCustomer()">保存</button>
<button class="sub" onclick="clearForm()">入力クリア</button>
</div>

<div class="card">
<h3>検索</h3>

<div class="search-box">
<input id="searchName" placeholder="名前検索" oninput="renderCustomers()">
<input id="searchPhone" placeholder="電話番号検索" oninput="renderCustomers()">
<input id="searchMonth" type="month" oninput="renderCustomers()">
<input id="searchMemo" placeholder="メモ検索" oninput="renderCustomers()">

<select id="sortMode" onchange="renderCustomers()">
<option value="lastVisitDesc">最終来店が新しい順</option>
<option value="lastVisitAsc">最終来店が古い順</option>
<option value="visitCountDesc">来店回数が多い順</option>
<option value="createdDesc">登録が新しい順</option>
</select>
</div>

<button class="ngbtn" onclick="showNgOnly()">NG一覧</button>
<button class="sub" onclick="showAllCustomers()">全員表示</button>

<p class="small">来た月検索は「最終来店日」を基準に検索します。</p>
</div>

<div class="card">
<h3>バックアップ</h3>
<button onclick="downloadBackup()">バックアップ保存</button>
<input type="file" id="backupFile" onchange="loadBackup()">
<p class="small">電話番号入りなので、バックアップファイルの扱いには注意してください。</p>
</div>

<div id="customerList"></div>

<script>

let customers =
JSON.parse(localStorage.getItem("customers_v4")) ||
JSON.parse(localStorage.getItem("customers_v3")) ||
JSON.parse(localStorage.getItem("customers")) ||
[];

let ngOnly = false;

function saveToStorage(){
localStorage.setItem("customers_v4", JSON.stringify(customers));
}

function clearForm(){
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("firstVisit").value="";
document.getElementById("lastVisit").value="";
document.getElementById("nextVisit").value="";
document.getElementById("visitCount").value="";
document.getElementById("memo").value="";
document.getElementById("isNg").checked=false;
document.getElementById("ngReason").value="";
}

function saveCustomer(){

const name = document.getElementById("name").value.trim();

if(!name){
alert("名前を入力してください");
return;
}

if(!confirm(`「${name}」さんを新しい顧客データとして保存しますか？`)) return;

const countValue = Number(document.getElementById("visitCount").value);
const now = new Date().toLocaleString();

customers.unshift({
id:Date.now(),
name:name,
phone:document.getElementById("phone").value.trim(),
firstVisit:document.getElementById("firstVisit").value,
lastVisit:document.getElementById("lastVisit").value,
nextVisit:document.getElementById("nextVisit").value,
visitCount:Number.isFinite(countValue) && countValue > 0 ? countValue : 1,
memo:document.getElementById("memo").value.trim(),
isNg:document.getElementById("isNg").checked,
ngReason:document.getElementById("ngReason").value.trim(),
created:now,
updated:now
});

saveToStorage();
clearForm();
renderCustomers();

}

function deleteCustomer(id){

if(!confirm("削除しますか？")) return;

customers = customers.filter(c=>c.id!==id);

saveToStorage();
renderCustomers();

}

function editCustomer(id){

const c = customers.find(x=>x.id===id);

if(!c){
alert("編集する顧客データが見つかりません");
return;
}

const editWindow = window.open("", "customerEdit_" + id, "width=540,height=760,scrollbars=yes,resizable=yes");

if(!editWindow){
alert("編集用の別窓を開けませんでした。ブラウザのポップアップブロックを解除してください。");
return;
}

editWindow.document.open();
editWindow.document.write(getEditWindowHtml());
editWindow.document.close();
editWindow.document.title = "顧客編集 - " + (c.name || "");

const doc = editWindow.document;

doc.getElementById("editName").value = c.name || "";
doc.getElementById("editPhone").value = c.phone || "";
doc.getElementById("editFirstVisit").value = c.firstVisit || "";
doc.getElementById("editLastVisit").value = c.lastVisit || "";
doc.getElementById("editNextVisit").value = c.nextVisit || "";
doc.getElementById("editVisitCount").value = c.visitCount || 1;
doc.getElementById("editMemo").value = c.memo || "";
doc.getElementById("editIsNg").checked = c.isNg === true;
doc.getElementById("editNgReason").value = c.ngReason || "";

doc.getElementById("editForm").addEventListener("submit", event=>{
event.preventDefault();

const editedCustomer = {
name:doc.getElementById("editName").value.trim(),
phone:doc.getElementById("editPhone").value.trim(),
firstVisit:doc.getElementById("editFirstVisit").value,
lastVisit:doc.getElementById("editLastVisit").value,
nextVisit:doc.getElementById("editNextVisit").value,
visitCount:doc.getElementById("editVisitCount").value,
memo:doc.getElementById("editMemo").value.trim(),
isNg:doc.getElementById("editIsNg").checked,
ngReason:doc.getElementById("editNgReason").value.trim()
};

if(!editedCustomer.name){
editWindow.alert("名前を入力してください");
return;
}

if(!editWindow.confirm(`「${editedCustomer.name}」さんの編集内容を保存しますか？`)) return;

updateCustomerFromEditWindow(id, editedCustomer);
editWindow.close();
});

doc.getElementById("cancelButton").addEventListener("click", ()=>{
editWindow.close();
});

editWindow.focus();

}

function getEditWindowHtml(){

return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客編集</title>
<style>
body{
font-family:sans-serif;
margin:0;
padding:16px;
background:#f5f5f5;
}
h1{
font-size:22px;
margin:0 0 16px;
text-align:center;
}
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
label{
display:block;
font-weight:bold;
margin-top:10px;
margin-bottom:4px;
}
input,textarea{
width:100%;
padding:11px;
margin-top:5px;
margin-bottom:10px;
box-sizing:border-box;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}
.checkbox-row{
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
margin-bottom:10px;
font-weight:bold;
}
.checkbox-row input{
width:auto;
margin:0;
}
button{
padding:10px 14px;
margin:4px;
cursor:pointer;
border:none;
border-radius:8px;
background:#333;
color:white;
font-size:15px;
}
button.sub{
background:#777;
}
.actions{
margin-top:12px;
text-align:right;
}
</style>
</head>
<body>
<h1>顧客編集</h1>
<div class="card">
<form id="editForm">
<label>名前・呼び名</label>
<input id="editName" required>

<label>電話番号</label>
<input id="editPhone">

<label>初回来店日</label>
<input id="editFirstVisit" type="date">

<label>最終来店日</label>
<input id="editLastVisit" type="date">

<label>次回予約日</label>
<input id="editNextVisit" type="date">

<label>来店回数</label>
<input id="editVisitCount" type="number" min="0">

<label>メモ</label>
<textarea id="editMemo" rows="5"></textarea>

<label class="checkbox-row">
<input id="editIsNg" type="checkbox">
NG顧客にする
</label>

<label>NG理由</label>
<textarea id="editNgReason" rows="3"></textarea>

<div class="actions">
<button type="submit">保存</button>
<button type="button" class="sub" id="cancelButton">キャンセル</button>
</div>
</form>
</div>
</body>
</html>`;

}

function updateCustomerFromEditWindow(id, editedCustomer){

const c = customers.find(x=>x.id===id);

if(!c){
alert("編集する顧客データが見つかりません");
return;
}

c.name = editedCustomer.name;
c.phone = editedCustomer.phone;
c.firstVisit = editedCustomer.firstVisit;
c.lastVisit = editedCustomer.lastVisit;
c.nextVisit = editedCustomer.nextVisit;
c.visitCount = Number(editedCustomer.visitCount) || 1;
c.memo = editedCustomer.memo;
c.isNg = editedCustomer.isNg;
c.ngReason = editedCustomer.ngReason;
c.updated = new Date().toLocaleString();

saveToStorage();
renderCustomers();

}

function addVisit(id){

const c = customers.find(x=>x.id===id);

const today = new Date().toISOString().slice(0,10);

if(!confirm("本日を最終来店日として記録し、来店回数を1回増やしますか？")) return;

if(!c.firstVisit) c.firstVisit = today;
c.lastVisit = today;
c.visitCount = Number(c.visitCount || 0) + 1;
c.updated = new Date().toLocaleString();

saveToStorage();
renderCustomers();

}

function daysFrom(dateText){

if(!dateText) return "-";

const today = new Date();
today.setHours(0,0,0,0);

const target = new Date(dateText);
target.setHours(0,0,0,0);

const diff = Math.floor((today - target) / (1000 * 60 * 60 * 24));

if(isNaN(diff)) return "-";

return diff + "日";

}

function getSortDate(value){
if(!value) return 0;
const time = new Date(value).getTime();
return isNaN(time) ? 0 : time;
}

function showNgOnly(){
ngOnly = true;
renderCustomers();
}

function showAllCustomers(){
ngOnly = false;
renderCustomers();
}

function renderCustomers(){

const nameSearch = document.getElementById("searchName").value.toLowerCase();
const phoneSearch = document.getElementById("searchPhone").value;
const monthSearch = document.getElementById("searchMonth").value;
const memoSearch = document.getElementById("searchMemo").value.toLowerCase();
const sortMode = document.getElementById("sortMode").value;

let html="";

let filtered = customers.filter(c=>{

const nameMatch = (c.name || "").toLowerCase().includes(nameSearch);
const phoneMatch = (c.phone || "").includes(phoneSearch);

const monthMatch =
!monthSearch ||
(c.lastVisit &&
c.lastVisit.startsWith(monthSearch));

const memoMatch = (c.memo || "").toLowerCase().includes(memoSearch);
const ngMatch = !ngOnly || c.isNg === true;

return nameMatch && phoneMatch && monthMatch && memoMatch && ngMatch;

});

filtered.sort((a,b)=>{
if(sortMode === "lastVisitAsc"){
return getSortDate(a.lastVisit) - getSortDate(b.lastVisit);
}
if(sortMode === "visitCountDesc"){
return Number(b.visitCount || 0) - Number(a.visitCount || 0);
}
if(sortMode === "createdDesc"){
return Number(b.id || 0) - Number(a.id || 0);
}
return getSortDate(b.lastVisit) - getSortDate(a.lastVisit);
});

html += `<p class="small">表示件数: ${filtered.length}件 ${ngOnly ? "（NG一覧）" : ""}</p>`;

filtered.forEach(c=>{

html += `
<div class="customer ${c.isNg ? 'ng' : ''}">

<b>${escapeHtml(c.name || "")}</b><br>

<span class="badge">📞 ${escapeHtml(c.phone || "-")}</span>
<span class="badge">🔁 来店 ${c.visitCount || 0}回</span>
<span class="badge">⏳ 最終来店から ${daysFrom(c.lastVisit)}</span>
${c.isNg ? '<span class="ng-label">⚠️ NG</span>' : ''}
<br>

📅 初回来店: ${escapeHtml(c.firstVisit || "-")}<br>
📅 最終来店: ${escapeHtml(c.lastVisit || "-")}<br>
📌 次回予約: ${escapeHtml(c.nextVisit || "-")}<br>

<div class="memo">📝 ${escapeHtml(c.memo || "-").replace(/\n/g,"<br>")}</div>
${c.isNg ? `<div class="memo"><b>⚠️ NG理由:</b> ${escapeHtml(c.ngReason || "-").replace(/\n/g,"<br>")}</div>` : ""}

<span class="small">
🕒 登録: ${escapeHtml(c.created || "-")}<br>
🔧 更新: ${escapeHtml(c.updated || "-")}
</span>

<div class="actions">
<button onclick="addVisit(${c.id})">本日来店</button>
<button onclick="editCustomer(${c.id})">編集</button>
<button class="danger" onclick="deleteCustomer(${c.id})">削除</button>
</div>

</div>
`;

});

document.getElementById("customerList").innerHTML = html;

}

function escapeHtml(text){

return String(text)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");

}

function downloadBackup(){

if(!confirm("顧客データのバックアップファイルを保存しますか？")) return;

const blob =
new Blob([JSON.stringify(customers,null,2)], {type:"application/json"});

const a = document.createElement("a");
const today = new Date().toISOString().slice(0,10);

a.href = URL.createObjectURL(blob);
a.download = "customer_backup_" + today + ".json";
a.click();

}

function loadBackup(){

const file = document.getElementById("backupFile").files[0];

if(!file) return;

if(!confirm("現在のデータをバックアップデータで上書きしますか？")) return;

const reader = new FileReader();

reader.onload = e=>{

try{
customers = JSON.parse(e.target.result);
saveToStorage();
renderCustomers();
alert("復元完了");
}catch(err){
alert("読み込みに失敗しました");
}

};

reader.readAsText(file);

}

renderCustomers();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
